// ── Supabase save ─────────────────────────────────────────────────────────────
async function saveVisitToSupabase(formData, checklistData) {
  const url = window.SUPABASE_URL;
  const key = window.SUPABASE_ANON_KEY;
  if (!url || !key) return;
  try {
    await fetch(url + '/rest/v1/visits', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': key,
        'Authorization': 'Bearer ' + key,
        'Prefer': 'return=minimal',
      },
      body: JSON.stringify({
        center_name: formData.centerName || '',
        visit_date: formData.date || null,
        visit_time: formData.time || null,
        met_director: !!formData.metWithDirector,
        visited_rooms: !!formData.visitOpenRooms,
        education_newsletter: !!formData.educationNewsletter,
        notes: formData.notes || '',
        imm_infant: formData.imm_infant || null,
        imm_toddler: formData.imm_toddler || null,
        imm_over18: formData.imm_over18 || null,
        imm_mixed: formData.imm_mixed || null,
        imm_letters: !!formData.imm_letters,
        checklist: checklistData,
      })
    });
  } catch(e) { console.warn('Supabase save failed:', e); }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function cycleStatus(current) {
  const vals = [null, "direct", "evidence", "not_observed", "na"];
  const idx = vals.indexOf(current);
  return vals[(idx + 1) % vals.length];
}

function getStatusStyle(value) {
  const opt = STATUS_OPTIONS.find((o) => o.value === value);
  if (!opt) return { background: "#f9fafb", border: "1.5px solid #e5e7eb", color: "#9ca3af" };
  return { background: opt.bg, border: `1.5px solid ${opt.border}`, color: opt.color };
}

function getStatusLabel(value) {
  const opt = STATUS_OPTIONS.find((o) => o.value === value);
  return opt ? opt.label : "Tap to set";
}

// ── Main App ──────────────────────────────────────────────────────────────────
function NurseVisitSheet() {
  const [mode, setMode] = useState("intake"); // "intake" | "wizard"
  const [step, setStep] = useState(0);
  const [formData, setFormData] = useState({});
  const [checklistData, setChecklistData] = useState({});
  const [commentData, setCommentData] = useState({});
  const [showReview, setShowReview] = useState(false);
  const topRef = useRef(null);

  const totalSteps = SECTIONS.length;
  const section = SECTIONS[step];
  const progress = ((step) / totalSteps) * 100;

  function scrollTop() {
    topRef.current?.scrollIntoView({ behavior: "smooth" });
  }

  function next() {
    if (step < totalSteps - 1) { setStep(step + 1); scrollTop(); }
    else setShowReview(true);
  }
  function prev() {
    if (showReview) { setShowReview(false); return; }
    if (step > 0) { setStep(step - 1); scrollTop(); }
  }

  function updateField(id, value) {
    setFormData((prev) => ({ ...prev, [id]: value }));
  }

  function updateChecklist(id) {
    setChecklistData((prev) => ({ ...prev, [id]: cycleStatus(prev[id]) }));
  }

  function sectionComplete(s) {
    if (s.type === "header") return !!formData.centerName;
    if (s.type === "checklist") return s.items.every((i) => checklistData[i.id]);
    return true;
  }

  function launchWizard(fd, cd) {
    setFormData(fd || {});
    setChecklistData(cd || {});
    setStep(0);
    setShowReview(false);
    setMode("wizard");
    setTimeout(() => topRef.current?.scrollIntoView({ behavior: "smooth" }), 50);
  }

  // ── Render ──
  if (mode === "intake") {
    return <IntakeScreen onLaunch={launchWizard} topRef={topRef} />;
  }

  return (
    <div style={{
      minHeight: "100vh",
      background: "linear-gradient(160deg, #0f3460 0%, #16213e 60%, #0d1b2a 100%)",
      fontFamily: "'DM Sans', 'Segoe UI', sans-serif",
      padding: "0 0 60px 0",
    }}>
      {/* Header */}
      <div ref={topRef} style={{
        background: "rgba(255,255,255,0.05)",
        backdropFilter: "blur(12px)",
        borderBottom: "1px solid rgba(255,255,255,0.1)",
        padding: "16px 20px 12px",
        position: "sticky",
        top: 0,
        zIndex: 50,
      }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div>
            <div style={{ color: "#7dd3fc", fontSize: 10, fontWeight: 700, letterSpacing: "0.12em", textTransform: "uppercase" }}>
              All About Childcare Health
            </div>
            <div style={{ color: "white", fontSize: 16, fontWeight: 700, marginTop: 2 }}>
              Nurse Visit Sheet
            </div>
          </div>
          <div style={{ color: "#94a3b8", fontSize: 12 }}>
            {showReview ? "Review" : `${step + 1} / ${totalSteps}`}
          </div>
        </div>
        {/* Progress bar */}
        <div style={{ marginTop: 10, height: 3, background: "rgba(255,255,255,0.1)", borderRadius: 2 }}>
          <div style={{
            height: "100%",
            width: `${showReview ? 100 : progress}%`,
            background: "linear-gradient(90deg, #38bdf8, #34d399)",
            borderRadius: 2,
            transition: "width 0.4s ease",
          }} />
        </div>
        {/* Step dots */}
        <div style={{ display: "flex", gap: 4, marginTop: 8, flexWrap: "wrap" }}>
          {SECTIONS.map((s, i) => (
            <button key={s.id} onClick={() => { setShowReview(false); setStep(i); scrollTop(); }}
              style={{
                width: 8, height: 8, borderRadius: "50%", border: "none", cursor: "pointer", padding: 0,
                background: i === step && !showReview ? "#38bdf8" : sectionComplete(s) ? "#34d399" : "rgba(255,255,255,0.2)",
                transition: "all 0.2s",
              }} />
          ))}
          <button onClick={() => setShowReview(true)}
            style={{
              width: 8, height: 8, borderRadius: "50%", border: "none", cursor: "pointer", padding: 0,

      {/* Content */}

        {showReview ? (

            onGenerate={() => { generatePDF(formData, checklistData); saveVisitToSupabase(formData, checklistData); }}
          />
        ) : (
          <SectionForm
            section={section}
            formData={formData}
            checklistData={checklistData}
            commentData={commentData}
            onField={updateField}
            onChecklist={updateChecklist}

      </div>

      {/* Nav */}
      {!showReview && (
        <div style={{
          position: "fixed", bottom: 0, left: 0, right: 0,
          padding: "12px 16px",
          background: "rgba(15,52,96,0.95)",
          backdropFilter: "blur(16px)",
          borderTop: "1px solid rgba(255,255,255,0.08)",
          display: "flex", gap: 10,
        }}>
          {step > 0 && (
            <button onClick={prev} style={{
              flex: 1, padding: "13px", borderRadius: 10, border: "1px solid rgba(255,255,255,0.15)",
              background: "transparent", color: "#94a3b8", fontWeight: 600, fontSize: 14, cursor: "pointer",

          <button onClick={next} style={{
            flex: 2, padding: "13px", borderRadius: 10, border: "none",
            background: "linear-gradient(135deg, #0ea5e9, #38bdf8)",
            color: "white", fontWeight: 700, fontSize: 15, cursor: "pointer",
            boxShadow: "0 4px 20px rgba(14,165,233,0.35)",
          }}>
            {step === totalSteps - 1 ? "Review →" : "Next →"}
          </button>
        </div>
      )}
    </div>
  );
}

// ── Local narrative parser (fallback when API is unavailable) ─────────────────
function parseNarrativeLocally(text) {
  const t = text.toLowerCase();
  const has = (...words) => words.some(w => t.includes(w));
  const status = (pos, neg) => {
    if (has(...(neg||[]))) return "not_observed";
    if (has(...pos)) return "direct";
    return null;
  };

  // Extract center name — look for patterns like "visited X" or "at X center/childcare"
  const centerMatch = text.match(/visited\s+([A-Z][\w\s]+?)(?:\s+on|\s+at|\s*,|\.|$)/i)
    || text.match(/([A-Z][\w\s]+(?:Center|Childcare|Care|Academy|School|Daycare))/i);
  const centerName = centerMatch ? centerMatch[1].trim() : "";

  // Extract date
  const dateMatch = text.match(/(\d{4}-\d{2}-\d{2})|(?:(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)[a-z]*\.?\s+(\d{1,2})(?:st|nd|rd|th)?[,\s]+(\d{4}))/i);
  let date = "";
  if (dateMatch) {
    if (dateMatch[1]) date = dateMatch[1];
  }

  // Extract time
  const timeMatch = text.match(/(\d{1,2})(?::(\d{2}))?\s*(am|pm)/i);
  let time = "";
  if (timeMatch) {
    let h = parseInt(timeMatch[1]);
    const m = timeMatch[2] || "00";
    if (timeMatch[3].toLowerCase() === "pm" && h < 12) h += 12;
    if (timeMatch[3].toLowerCase() === "am" && h === 12) h = 0;
    time = String(h).padStart(2,"0") + ":" + m;
  }

  const inf = text.match(/(\d+)\s*infant/i);
  const tod = text.match(/(\d+)\s*toddler/i);
  const o18 = text.match(/(\d+)\s*over\s*18/i);
  const mix = text.match(/(\d+)\s*mixed/i);

  return {
    formData: {
      centerName,
      time,
      date,
      metWithDirector: has("met with director","spoke with director","director was present","met the director"),
      visitOpenRooms: has("visited room","open room","walked through","toured","visited the room"),
      educationNewsletter: has("newsletter","provided education","education newsletter"),
      notes: text,
      imm_infant: inf ? inf[1] : "",
      imm_toddler: tod ? tod[1] : "",
      imm_over18: o18 ? o18[1] : "",
      imm_mixed: mix ? mix[1] : "",
      imm_letters: has("letters to parent","omission letter","sent letters"),
    },
    checklistData: {
      hw_technique: status(["hand wash","washing hands","wash hands","handwash"],["not washing","didn't wash","no hand wash"]),
      hw_frequency: status(["washing frequently","wash after","hand hygiene"],["not washing","skipping"]),
      hw_supplies: status(["soap","paper towel","disposable towel","hand wash sink"],["no soap","no towel","missing supplies"]),
      dc_supplies: status(["diaper supplies","wipes","diaper area"],["no supplies","missing diaper"]),
      dc_impervious: status(["impervious","changing table","waterproof surface"],["not impervious"]),
      dc_gloves: status(["gloves","latex glove"],["no gloves","without gloves"]),
      dc_discard: status(["covered container","trash","disposed","discarded"],["left out","not disposed"]),
      dc_wash: status(["washed hands after","hands washed","wash after diaper"],["didn't wash"]),
      dc_sanitize: status(["sanitized","cleaned surface","wiped down"],["not sanitized","not cleaned"]),
      dc_posted: status(["procedure posted","posted","sign","instructions posted"],["not posted"]),
      disc_positive: status(["positive guidance","positive discipline","redirection","developmentally appropriate"],["yelling","harsh","punish"]),
      disc_noprohibited: status(["no prohibited","appropriate discipline","positive only"],["yelling","hit","humiliat","shame","emotional abuse","physical punishment"]),
      med_policy: status(["medication policy","med policy","policy present","policy posted"],["no policy","missing policy"]),
      med_locked: status(["locked","secure","cabinet","locked medication"],["unlocked","accessible","not locked"]),
      med_labeled: status(["labeled","label","properly labeled"],["unlabeled","not labeled"]),
      med_expiration: status(["not expired","current","valid","expiration checked"],["expired"]),
      med_log: status(["medication log","med log","documented","log"],["no log","not documented"]),
      med_permission: status(["permission","authorization","parent permission"],["no permission","unauthorized"]),
      if_labeled: status(["bottle labeled","labeled bottle","dated bottle"],["unlabeled bottle"]),
      if_nomicrowave: status(["no microwave","not microwaved"],["microwave"]),
      if_nopropping: status(["no propping","not propped"],["propped bottle","propping"]),
      food_servings: status(["age appropriate","appropriate serving","right portion"],["inappropriate","too much","too little"]),
      food_choking: status(["choking","cut","appropriate size","bite size"],["choking hazard"]),
      food_nutrition: status(["nutrition","balanced","healthy","meal plan"],["unhealthy","poor nutrition"]),
      gs_supervision: status(["supervised","adequate supervision","staff ratio","watching"],["unsupervised","no supervision","left alone"]),
      gs_cleanliness: status(["clean","tidy","organized","neat","sanitary"],["dirty","messy","unclean","filthy"]),
      ss_spacing: status(["spacing","2 feet","crib spacing","distance between crib"],["too close","no spacing"]),
      ss_mattress: status(["tight mattress","firm mattress","not drop side","fixed side"],["drop side","loose mattress"]),
      ss_cribonly: status(["crib only","sleep in crib","not in swing","not in car seat"],["swing","car seat","bouncer"]),
      ss_back: status(["back to sleep","on back","supine"],["stomach","side sleep","on tummy"]),
      ss_nothing: status(["nothing in crib","empty crib","just sheet","just pacifier"],["blanket in crib","stuffed animal","pillow in crib"]),
      ss_observed: status(["can be seen","visible","observable","staff can see","line of sight"],["can't see","not visible","hidden"]),
      pg_clean: status(["playground clean","clean playground","no debris"],["dirty playground","debris"]),
      pg_surface: status(["appropriate surface","safe surface","rubber","mulch","soft surface"],["hard surface","concrete","unsafe"]),
      pg_maintained: status(["maintained","good condition","no damage","well kept"],["broken","damaged","needs repair"]),
      pg_sandbox: status(["covered sandbox","sandbox covered","sandbox lid"],["uncovered sandbox","open sandbox"]),
      toy_mouthed: status(["mouthed toys","toys cleaned","sanitized toys","toys sanitized"],["not cleaned","dirty toys"]),
      em_action: status(["action plan","allergy plan","special needs plan"],["no action plan","missing plan"]),
      em_phone: status(["emergency number","phone number","emergency contact"],["no number","missing number"]),
      em_evacuation: status(["evacuation plan","fire plan","emergency plan","evacuation posted"],["no evacuation","missing evacuation"]),
      em_firstaid: status(["first aid","first-aid","aid kit","aid box"],["no first aid","missing first aid","not stocked"]),
      em_poison: status(["poison control","911","emergency numbers posted"],["no poison","missing 911"]),
      em_choking: status(["choking poster","heimlich","first aid posted","cpr posted"],["no choking","not posted"]),
      em_isolation: status(["isolation area","sick room","isolation space","separate area for ill"],["no isolation","no sick room"]),
    }
  };
}


// ── Intake Screen ─────────────────────────────────────────────────────────────
function IntakeScreen({ onLaunch, topRef }) {
  const [narrative, setNarrative] = useState("");
  const [status, setStatus] = useState("idle"); // idle | loading | done | error
  const [parsed, setParsed] = useState(null);
  const [errorMsg, setErrorMsg] = useState("");
  const [debugLog, setDebugLog] = useState("");

  const SYSTEM_PROMPT = `You are a nurse visit form assistant. The user will describe a childcare center visit in plain language. 
Extract structured data and return ONLY a valid JSON object with no preamble, explanation, or markdown fences.

The JSON must have exactly these keys:

formData: {
  centerName: string,
  time: string (HH:MM 24h or ""),
  date: string (YYYY-MM-DD or ""),
  metWithDirector: boolean,
  visitOpenRooms: boolean,
  educationNewsletter: boolean,
  notes: string,
  imm_infant: string (number or ""),
  imm_toddler: string (number or ""),
  imm_over18: string (number or ""),
  imm_mixed: string (number or ""),
  imm_letters: boolean
}

checklistData: {
  hw_technique: one of "direct"|"evidence"|"not_observed"|"na"|null,
  hw_frequency: one of above or null,
  hw_supplies: one of above or null,
  dc_supplies: one of above or null,
  dc_impervious: one of above or null,
  dc_gloves: one of above or null,
  dc_discard: one of above or null,
  dc_wash: one of above or null,
  dc_sanitize: one of above or null,
  dc_posted: one of above or null,
  disc_positive: one of above or null,
  disc_noprohibited: one of above or null,
  med_policy: one of above or null,
  med_locked: one of above or null,
  med_labeled: one of above or null,
  med_expiration: one of above or null,
  med_log: one of above or null,
  med_permission: one of above or null,
  if_labeled: one of above or null,
  if_nomicrowave: one of above or null,
  if_nopropping: one of above or null,
  food_servings: one of above or null,
  food_choking: one of above or null,
  food_nutrition: one of above or null,
  gs_supervision: one of above or null,
  gs_cleanliness: one of above or null,
  ss_spacing: one of above or null,
  ss_mattress: one of above or null,
  ss_cribonly: one of above or null,
  ss_back: one of above or null,
  ss_nothing: one of above or null,
  ss_observed: one of above or null,
  pg_clean: one of above or null,
  pg_surface: one of above or null,
  pg_maintained: one of above or null,
  pg_sandbox: one of above or null,
  toy_mouthed: one of above or null,
  em_action: one of above or null,
  em_phone: one of above or null,
  em_evacuation: one of above or null,
  em_firstaid: one of above or null,
  em_poison: one of above or null,
  em_choking: one of above or null,
  em_isolation: one of above or null
}

Rules:
- If something is described as observed directly or seen happening, use "direct"
- If there is posted evidence, documents, records, or signs, use "evidence"  
- If something was not seen or not checked, use "not_observed"
- If something doesn't apply (e.g. sandbox for an indoor-only center), use "na"
- If the narrative gives no information about an item, use null
- Be generous in inferring: if nurse says "everything looked good" apply "direct" broadly
- Extract center name, time, date from the narrative where mentioned`;

  async function handleAnalyze() {
    if (!narrative.trim()) return;
    setStatus("loading");
    setErrorMsg("");
    setDebugLog("");

    try {
      const prompt = SYSTEM_PROMPT + "\n\nHere is the nurse visit narrative:\n\n" + narrative + "\n\nReturn ONLY the JSON object, no explanation, no markdown.";

      // Use the artifact-provided fetch which proxies to Anthropic API
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "anthropic-dangerous-direct-browser-access": "true",
          "x-api-key": window.ANTHROPIC_API_KEY,
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 2000,
          messages: [{ role: "user", content: prompt }],
        }),
      });

      let rawText = "";
      let data = null;

      try {
        rawText = await response.text();
      } catch(fetchErr) {
        // Sandbox blocked the fetch — fall back to parseNarrativeLocally
        const local = parseNarrativeLocally(narrative);
        setParsed(local);
        setDebugLog("Fetch blocked by sandbox — used local parser");
        setStatus("done");
        return;
      }

      setDebugLog("HTTP " + response.status + " | " + rawText.slice(0, 500));

      if (!response.ok) {
        throw new Error("HTTP " + response.status + ": " + rawText.slice(0, 300));
      }

      try { data = JSON.parse(rawText); } catch(e) {
        throw new Error("Response not JSON: " + rawText.slice(0, 200));
      }
      const text = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("");
      if (!text) throw new Error("No text content in API response");

      // Brace-depth JSON extraction
      let depth = 0, jsonStart = -1, jsonStr = "";
      for (let i = 0; i < text.length; i++) {
        if (text[i] === "{") { if (depth === 0) jsonStart = i; depth++; }
        else if (text[i] === "}") { depth--; if (depth === 0 && jsonStart !== -1) { jsonStr = text.slice(jsonStart, i + 1); break; } }
      }
      if (!jsonStr) throw new Error("No JSON object found in: " + text.slice(0, 200));

      const result = JSON.parse(jsonStr);
      if (!result.formData) result.formData = {};
      if (!result.checklistData) result.checklistData = {};

      setParsed(result);
      setStatus("done");
    } catch (err) {
      // If network/sandbox blocked, fall back to local keyword parser
      const errStr = String(err.message || err);
      if (errStr.includes("Invalid response") || errStr.includes("fetch") || errStr.includes("network") || errStr.includes("Failed")) {
        try {
          const local = parseNarrativeLocally(narrative);
          setParsed(local);
          setDebugLog("API unavailable — used local keyword parser");
          setStatus("done");
          return;
        } catch(localErr) { /* fall through to error state */ }
      }
      setStatus("error");
      setErrorMsg(errStr);
    }
  }
  function handleContinue() {
    onLaunch(parsed.formData, parsed.checklistData);
  }

  function handleSkip() {
    onLaunch({}, {});
  }

  const charCount = narrative.length;

  return (
    <div ref={topRef} style={{
      minHeight: "100vh",
      background: "linear-gradient(160deg, #0f3460 0%, #16213e 60%, #0d1b2a 100%)",
      fontFamily: "'DM Sans', 'Segoe UI', sans-serif",
      display: "flex", flexDirection: "column",
    }}>
      {/* Header */}
      <div style={{
        background: "rgba(255,255,255,0.05)",
        backdropFilter: "blur(12px)",
        borderBottom: "1px solid rgba(255,255,255,0.1)",
        padding: "16px 20px 14px",
      }}>
        <div style={{ color: "#7dd3fc", fontSize: 10, fontWeight: 700, letterSpacing: "0.12em", textTransform: "uppercase" }}>
          All About Childcare Health
        </div>
        <div style={{ color: "white", fontSize: 17, fontWeight: 700, marginTop: 2 }}>
          Nurse Visit Sheet
        </div>
      </div>

      <div style={{ padding: "24px 18px", maxWidth: 600, margin: "0 auto", width: "100%", flex: 1, display: "flex", flexDirection: "column" }}>

        {status === "idle" && (
          <>
            <div style={{ marginBottom: 22 }}>
              <div style={{ fontSize: 26, marginBottom: 8 }}>✍️</div>
              <div style={{ color: "white", fontSize: 20, fontWeight: 700, marginBottom: 6 }}>
                Describe your visit
              </div>
              <div style={{ color: "#64748b", fontSize: 13, lineHeight: 1.6 }}>
                Write what you remember in your own words — center name, what you observed, any issues, who you met with. The AI will pre-fill the entire form for you.
              </div>
            </div>

            <div style={{
              background: "rgba(56,189,248,0.06)",
              border: "1px solid rgba(56,189,248,0.18)",
              borderRadius: 10, padding: "10px 14px", marginBottom: 14,
              color: "#7dd3fc", fontSize: 11.5, lineHeight: 1.6,
            }}>
              💡 <strong>Example:</strong> "Visited Sunshine Center on April 5th at 10am. Met with director Maria. Staff were washing hands correctly, saw posted procedures in the diaper area, medications were locked. Cribs had proper spacing. First aid kit was stocked. Reviewed 6 infant files and 4 toddler files."
            </div>

            <textarea
              value={narrative}
              onChange={e => setNarrative(e.target.value)}
              placeholder="Start typing your visit narrative here..."
              rows={10}
              style={{
                width: "100%", borderRadius: 12,
                border: "1px solid rgba(255,255,255,0.12)",
                background: "rgba(255,255,255,0.06)", color: "white",
                fontSize: 15, outline: "none", fontFamily: "inherit",
                resize: "vertical", lineHeight: 1.7, padding: "14px",
                boxSizing: "border-box",
              }}
            />
            <div style={{ color: "#475569", fontSize: 11, textAlign: "right", marginTop: 5 }}>
              {charCount} characters
            </div>

            <div style={{ display: "flex", gap: 10, marginTop: 16 }}>
              <button onClick={handleSkip} style={{
                flex: 1, padding: "13px", borderRadius: 10,
                border: "1px solid rgba(255,255,255,0.12)",
                background: "transparent", color: "#64748b",
                fontWeight: 600, fontSize: 13, cursor: "pointer",
              }}>
                Skip — fill manually
              </button>
              <button
                onClick={handleAnalyze}
                disabled={!narrative.trim()}
                style={{
                  flex: 2, padding: "13px", borderRadius: 10, border: "none",
                  background: narrative.trim()
                    ? "linear-gradient(135deg, #0ea5e9, #38bdf8)"
                    : "rgba(255,255,255,0.08)",
                  color: narrative.trim() ? "white" : "#475569",
                  fontWeight: 700, fontSize: 15, cursor: narrative.trim() ? "pointer" : "default",
                  boxShadow: narrative.trim() ? "0 4px 20px rgba(14,165,233,0.35)" : "none",
                  transition: "all 0.2s",
                }}>
                Analyze & Pre-fill ✨
              </button>
            </div>
          </>
        )}

        {status === "loading" && (
          <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 20, paddingTop: 60 }}>
            <div style={{
              width: 56, height: 56, borderRadius: "50%",
              border: "3px solid rgba(56,189,248,0.2)",
              borderTop: "3px solid #38bdf8",
              animation: "spin 0.9s linear infinite",
            }} />
            <div style={{ color: "white", fontSize: 16, fontWeight: 600 }}>Analyzing your visit...</div>
            <div style={{ color: "#64748b", fontSize: 13, textAlign: "center", maxWidth: 260 }}>
              Reading your narrative and mapping it to all form fields
            </div>
            <style>{`@keyframes spin { to { transform: rotate(360deg); } }`}</style>
          </div>
        )}

        {status === "done" && parsed && (
          <>
            <div style={{ marginBottom: 20 }}>
              <div style={{ fontSize: 26, marginBottom: 8 }}>✅</div>
              <div style={{ color: "white", fontSize: 20, fontWeight: 700, marginBottom: 6 }}>
                Form pre-filled!
              </div>
              <div style={{ color: "#64748b", fontSize: 13, lineHeight: 1.6 }}>
                The AI has mapped your narrative to the form. Review and confirm below, then step through to verify each section.
              </div>
            </div>

            {/* Summary of what was extracted */}
            <div style={{
              background: "rgba(52,211,153,0.07)",
              border: "1px solid rgba(52,211,153,0.2)",
              borderRadius: 12, padding: "14px 16px", marginBottom: 16,
            }}>
              <div style={{ color: "#34d399", fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 10 }}>
                Extracted Info
              </div>
              {parsed.formData.centerName && (
                <Row label="Center" value={parsed.formData.centerName} />
              )}
              {parsed.formData.date && (
                <Row label="Date" value={parsed.formData.date} />
              )}
              {parsed.formData.time && (
                <Row label="Time" value={parsed.formData.time} />
              )}
              <Row label="Met Director" value={parsed.formData.metWithDirector ? "Yes" : "No"} />
              <Row label="Visited Rooms" value={parsed.formData.visitOpenRooms ? "Yes" : "No"} />
              <Row
                label="Checklist items filled"
                value={`${Object.values(parsed.checklistData).filter(Boolean).length} / ${Object.keys(parsed.checklistData).length}`}
              />
            </div>

            <div style={{ display: "flex", gap: 10 }}>
              <button onClick={() => setStatus("idle")} style={{
                flex: 1, padding: "13px", borderRadius: 10,
                border: "1px solid rgba(255,255,255,0.12)",
                background: "transparent", color: "#64748b",
                fontWeight: 600, fontSize: 13, cursor: "pointer",
              }}>
                ← Re-write
              </button>
              <button onClick={handleContinue} style={{
                flex: 2, padding: "13px", borderRadius: 10, border: "none",
                background: "linear-gradient(135deg, #0ea5e9, #34d399)",
                color: "white", fontWeight: 700, fontSize: 15, cursor: "pointer",
                boxShadow: "0 4px 20px rgba(14,165,233,0.35)",
              }}>
                Review & Edit Form →
              </button>
            </div>
          </>
        )}

        {status === "error" && (
          <>
            <div style={{ color: "#f87171", fontSize: 13, marginBottom: 12, padding: "12px 14px", background: "rgba(248,113,113,0.08)", borderRadius: 10, border: "1px solid rgba(248,113,113,0.2)", lineHeight: 1.5 }}>
              <div style={{ fontWeight: 700, marginBottom: 6 }}>⚠️ Error</div>
              <div style={{ wordBreak: "break-word" }}>{errorMsg}</div>
            </div>
            {debugLog && (
              <div style={{ color: "#64748b", fontSize: 11, marginBottom: 12, padding: "10px 12px", background: "rgba(0,0,0,0.2)", borderRadius: 8, fontFamily: "monospace", wordBreak: "break-all", lineHeight: 1.5 }}>
                <div style={{ color: "#475569", marginBottom: 4, fontFamily: "sans-serif", fontWeight: 600 }}>Debug log:</div>
                {debugLog}
              </div>
            )}
            <div style={{ display: "flex", gap: 10 }}>
              <button onClick={() => setStatus("idle")} style={{
                flex: 1, padding: "13px", borderRadius: 10, border: "1px solid rgba(255,255,255,0.12)",
                background: "transparent", color: "#94a3b8", fontWeight: 600, fontSize: 14, cursor: "pointer",
              }}>← Try again</button>
              <button onClick={() => onLaunch({}, {})} style={{
                flex: 1, padding: "13px", borderRadius: 10, border: "none",
                background: "rgba(255,255,255,0.08)", color: "#94a3b8", fontWeight: 600, fontSize: 13, cursor: "pointer",
              }}>Fill manually →</button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

function Row({ label, value }) {
  return (
    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6 }}>
      <span style={{ color: "#94a3b8", fontSize: 12 }}>{label}</span>
      <span style={{ color: "#e2e8f0", fontSize: 12, fontWeight: 600 }}>{value}</span>
    </div>
  );
}


    // Mount app
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(NurseVisitSheet));
  </script>

  <!-- PWA service worker registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
